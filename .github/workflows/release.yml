name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ndir-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ndir
      - uses: actions/upload-artifact@v4
        with:
          name: ndir-${{ matrix.target }}
          path: ndir-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            ndir-*.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Compute checksums
        id: sha
        run: |
          echo "aarch64_mac=$(sha256sum ndir-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_mac=$(sha256sum ndir-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(sha256sum ndir-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.HOMEBREW_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_APP_PRIVATE_KEY }}
          repositories: homebrew-tap
          owner: tonegawa07
      - uses: actions/checkout@v4
        with:
          repository: tonegawa07/homebrew-tap
          token: ${{ steps.app-token.outputs.token }}
      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/ndir.rb
          sed -i '0,/sha256 ".*"/{s/sha256 ".*"/sha256 "${{ steps.sha.outputs.aarch64_mac }}"/}' Formula/ndir.rb
          sed -i '0,/sha256 ".*"/{s/sha256 ".*"/sha256 "${{ steps.sha.outputs.x86_64_mac }}"/}' Formula/ndir.rb
          sed -i '0,/sha256 ".*"/{s/sha256 ".*"/sha256 "${{ steps.sha.outputs.x86_64_linux }}"/}' Formula/ndir.rb
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ndir.rb
          git commit -m "Update ndir to ${{ github.ref_name }}"
          git push
